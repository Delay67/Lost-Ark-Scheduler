<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost Ark Scheduler Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Lost Ark Scheduler Admin</h1>
        <p>Manage players and characters.</p>
      </header>

      <section class="panel">
        <h2>Create Player</h2>
        <form id="player-form">
          <label>
            Player Name
            <input id="player-name" type="text" required />
          </label>
          <button type="submit">Add Player</button>
        </form>
      </section>

      <section class="panel">
        <h2>Create Character</h2>
        <form id="character-form">
          <label>
            Player
            <select id="character-player" required></select>
          </label>
          <label>
            Character Name
            <input id="character-name" type="text" required />
          </label>
          <label>
            Role
            <select id="character-role" required>
              <option value="DPS">DPS</option>
              <option value="Support">Support</option>
              <option value="DPS/Support">DPS/Support</option>
            </select>
          </label>
          <label>
            Item Level
            <input id="character-ilvl" type="number" min="1" required />
          </label>
          <button type="submit">Add Character</button>
        </form>
      </section>

      <section class="panel">
        <h2>Players</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="players-table"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Characters</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Player</th>
              <th>Role</th>
              <th>Item Level</th>
              <th>ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="characters-table"></tbody>
        </table>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
